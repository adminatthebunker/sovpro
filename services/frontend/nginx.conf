server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:ico|css|js|svg|gif|jpe?g|png|woff2?|ttf|mmdb)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
