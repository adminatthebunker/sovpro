server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 2m;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # API
    location /api/ {
        proxy_pass http://sw_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health
    location = /health {
        proxy_pass http://sw_api/health;
    }

    # Locally-mirrored binary assets (politician portraits, etc).
    # Backed by the `assets` named volume, RW-written by the scanner
    # service and RO-mounted here. See db/migrations/0026 and
    # docs/plans/sovereignty-runtime-deps.md.
    #
    # Scoped to /assets/politicians/ so it does not shadow Vite's
    # build output (the frontend emits hashed bundles to /assets/*).
    # Anything else under /assets/ falls through to the frontend.
    location /assets/politicians/ {
        alias /var/www/assets/politicians/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
        access_log off;
    }

    # Uptime Kuma under /status/ (optional)
    location /status/ {
        proxy_pass http://sw_kuma/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Frontend
    location / {
        proxy_pass http://sw_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
