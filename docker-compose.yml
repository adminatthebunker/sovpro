# ═══════════════════════════════════════════════════════════════════════════
# Canadian Political Data — docker-compose orchestration
# ═══════════════════════════════════════════════════════════════════════════
# Start everything:           docker compose up -d
# Run a scan (on demand):     docker compose run --rm scanner scan
# Seed orgs:                  docker compose run --rm scanner seed-orgs
# Ingest federal MPs:         docker compose run --rm scanner ingest-mps
# Stop everything:            docker compose down
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ── Database ──────────────────────────────────────────────────────
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    image: sovpro-db:latest
    container_name: sw-db
    environment:
      POSTGRES_DB: sovereignwatch
      POSTGRES_USER: sw
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      TZ: UTC
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sw -d sovereignwatch"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [sw]

  # ── API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: sw-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 3000
      API_HOST: 0.0.0.0
      API_LOG_LEVEL: ${API_LOG_LEVEL:-info}
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-*}
      DATABASE_URL: postgresql://sw:${DB_PASSWORD}@db:5432/sovereignwatch
      CHANGE_WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    restart: unless-stopped
    networks: [sw]

  # ── Frontend (static SPA served by nginx:alpine) ──────────────────
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: sw-frontend
    restart: unless-stopped
    networks: [sw]

  # ── Embedding service (BGE-M3 + BGE-reranker, GPU fp16) ───────────
  # Self-hosted so the semantic-search layer has no paid-API dependency.
  # Runs BGE-M3 + BGE-reranker-v2-m3 on a CUDA device via the pytorch/
  # pytorch:2.5.1-cuda12.4-cudnn9-runtime base image. Model weights
  # cache in the `embedmodels` named volume — first /embed call pulls
  # ~2 GB from HuggingFace; subsequent boots are seconds.
  #
  # VRAM usage at batch=32: ~2 GB weights + ~1 GB activations ≈ 3 GB.
  # Safe on a 6 GiB card while the desktop compositor (gnome-shell,
  # browsers) holds the remaining ~1 GiB. If you need the card for
  # something else, `docker compose stop embed` releases it cleanly.
  #
  # To run on CPU-only hosts: replace pytorch/pytorch base with the
  # python:3.11-slim variant (in git history at 2026-04-16) and remove
  # the deploy.resources.reservations block.
  embed:
    build:
      context: ./services/embed
      dockerfile: Dockerfile
    image: sovpro-embed:latest
    container_name: sw-embed
    environment:
      EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-m3}
      RERANK_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      MAX_BATCH: ${EMBED_MAX_BATCH:-128}
      LOG_LEVEL: ${EMBED_LOG_LEVEL:-INFO}
      TOKENIZERS_PARALLELISM: "false"
      # Pin CUDA to the one RTX card visible on the host. Overridable
      # in .env if the host ever grows a second GPU and we want to
      # dedicate one to embedding.
      NVIDIA_VISIBLE_DEVICES: ${EMBED_CUDA_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Allocator tuning for the RTX 4050 Mobile (6 GiB Ada). The earlier
      # `expandable_segments:True` experiment on 2026-04-16 was blamed
      # for crash-looping but the real culprit was a wedged NVIDIA
      # driver state (see docs/runbooks/resume-after-reboot-2026-04-16.md).
      # Re-enabled on a healthy driver 2026-04-17 combined with:
      #   - garbage_collection_threshold:0.8 → release cached blocks
      #     once reserved memory climbs above 80% of a limit, pre-empting
      #     the fragmentation spiral that precedes our Xid 62 crashes.
      #   - max_split_size_mb:512 → prevents outlier 8192-token batches
      #     from carving oversized arenas the allocator can't reuse.
      PYTORCH_CUDA_ALLOC_CONF: ${PYTORCH_CUDA_ALLOC_CONF-expandable_segments:True,garbage_collection_threshold:0.8,max_split_size_mb:512}
      # Cap cuBLAS workspace so it doesn't compete with the model
      # weights for the 6 GiB budget. :4096:8 = 4 MiB × 8 streams.
      CUBLAS_WORKSPACE_CONFIG: ${CUBLAS_WORKSPACE_CONFIG-:4096:8}
    volumes:
      - embedmodels:/models
    restart: unless-stopped
    networks: [sw]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${EMBED_GPU_COUNT:-all}
              capabilities: [gpu]
        # Soft memory cap — host RAM, not VRAM. Keeps the tokeniser +
        # HTTP layer from starving the rest of the stack on long runs.
        limits:
          memory: ${EMBED_MEMORY:-6g}

  # ── Scanner (run-on-demand) ───────────────────────────────────────
  scanner:
    build:
      context: ./services/scanner
      dockerfile: Dockerfile
    container_name: sw-scanner
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sw:${DB_PASSWORD}@db:5432/sovereignwatch
      SCANNER_CONCURRENCY: ${SCANNER_CONCURRENCY:-16}
      SCANNER_HTTP_TIMEOUT: ${SCANNER_HTTP_TIMEOUT:-15}
      SCANNER_USER_AGENT: ${SCANNER_USER_AGENT:-CanadianPoliticalDataBot/1.0 (+https://canadianpoliticaldata.ca)}
      GEOIP_CITY_PATH: /data/GeoLite2-City.mmdb
      GEOIP_ASN_PATH:  /data/GeoLite2-ASN.mmdb
      SEED_SQL_PATH: /app/db/seed.sql
      OPENNORTH_BASE: ${OPENNORTH_BASE:-https://represent.opennorth.ca}
      EMBED_URL: ${EMBED_URL:-http://embed:8000}
      EMBED_BATCH: ${EMBED_BATCH:-32}
    volumes:
      - ./data:/data:ro
      - ./db:/app/db:ro
      # Phase 4 helper scripts (e.g. scripts/generate_muni_sets.py).
      # The generator also needs write access to the scanner's src directory
      # so the refreshed _muni_sets_generated.py persists to the host repo.
      - ./scripts:/app/scripts:ro
      - ./services/scanner/src:/app/src
    profiles: ["tools"]
    networks: [sw]

  # ── Admin-panel jobs worker ───────────────────────────────────────
  # Consumes scanner_jobs (queued) and expands scanner_schedules (cron).
  # Reuses the scanner image; single worker process; one job at a time.
  # Separate from scanner-cron because that is a fixed-schedule bash
  # loop — the DB-driven admin queue is its own concern.
  scanner-jobs:
    build:
      context: ./services/scanner
      dockerfile: Dockerfile
    container_name: sw-scanner-jobs
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sw:${DB_PASSWORD}@db:5432/sovereignwatch
      EMBED_URL: ${EMBED_URL:-http://embed:8000}
      EMBED_BATCH: ${EMBED_BATCH:-32}
      SCANNER_CONCURRENCY: ${SCANNER_CONCURRENCY:-16}
      GEOIP_CITY_PATH: /data/GeoLite2-City.mmdb
      GEOIP_ASN_PATH:  /data/GeoLite2-ASN.mmdb
      JOBS_POLL_INTERVAL: ${JOBS_POLL_INTERVAL:-5}
      JOBS_DEFAULT_TIMEOUT: ${JOBS_DEFAULT_TIMEOUT:-7200}
    volumes:
      - ./data:/data:ro
      - ./db:/app/db:ro
      - ./services/scanner/src:/app/src
    entrypoint: ["python", "-m", "src", "jobs-worker"]
    restart: unless-stopped
    networks: [sw]

  # ── Scheduled scanner (cron-ish sidecar) ──────────────────────────
  scanner-cron:
    build:
      context: ./services/scanner
      dockerfile: Dockerfile
    container_name: sw-scanner-cron
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sw:${DB_PASSWORD}@db:5432/sovereignwatch
      SCANNER_CONCURRENCY: ${SCANNER_CONCURRENCY:-16}
      GEOIP_CITY_PATH: /data/GeoLite2-City.mmdb
      GEOIP_ASN_PATH:  /data/GeoLite2-ASN.mmdb
    volumes:
      - ./data:/data:ro
      - ./db:/app/db:ro
      - ./scripts/scanner-cron.sh:/cron.sh:ro
    entrypoint: ["/bin/sh", "/cron.sh"]
    restart: unless-stopped
    networks: [sw]

  # ── Change detection (external service) ───────────────────────────
  change-detection:
    image: ghcr.io/thedurancode/change:latest
    container_name: sw-change
    volumes:
      - changedata:/data
    environment:
      WEBHOOK_URL: http://api:3000/api/v1/webhooks/change
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    depends_on: [api]
    restart: unless-stopped
    networks: [sw]

  # ── Uptime Kuma ───────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: sw-kuma
    volumes:
      - kumadata:/app/data
    restart: unless-stopped
    networks: [sw]

  # ── nginx (public entrypoint) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sw-nginx
    ports:
      - "${HTTP_PORT:-8088}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on: [api, frontend]
    restart: unless-stopped
    networks: [sw]

  # ── Pangolin Newt tunnel (outbound to pangolin.bnkserve.org) ──────
  newt:
    image: fosrl/newt
    container_name: sw-newt
    restart: unless-stopped
    environment:
      PANGOLIN_ENDPOINT: ${PANGOLIN_ENDPOINT:-https://pangolin.bnkserve.org}
      NEWT_ID: ${NEWT_ID}
      NEWT_SECRET: ${NEWT_SECRET}
    depends_on: [nginx]
    networks: [sw]

volumes:
  pgdata:
  changedata:
  kumadata:
  embedmodels:

networks:
  sw:
    driver: bridge
